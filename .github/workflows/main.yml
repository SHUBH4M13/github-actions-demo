name: CI Demo

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: List files
        run: ls -la

      - name: Display HTML content
        run: cat hello.html

      - name: Build Docker image
      run: docker build -t hello-app .

      - name: Run container
      run: docker run -d -p 8080:80 hello-app